<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments and Reviews</title>
    <link rel="stylesheet" href="../styles/global.css">
</head>
<body>
    <header>
        <h1>Comments and Reviews</h1>
    </header>
    <main>
        <section id="comments-section">
            <h2>User Comments</h2>
            <div id="comments-list">
                <!-- Existing comments will be dynamically loaded here -->
            </div>
        </section>
        <section id="leave-comment">
            <h2>Leave a Comment</h2>
            <form id="comment-form">
                <textarea id="comment-text" placeholder="Write your comment here..." required></textarea>
                <button type="submit">Submit</button>
            </form>
        </section>
    </main>
    <script src="../scripts/main.js"></script>
</body>
</html>
